<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>キノピオファクトリー：プロモード完全バグ修正統合版</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #ui-container {
            position: absolute; top: 20px; left: 20px; color: white; font-weight: bold;
            background: rgba(0,0,0,0.6); padding: 15px; border-radius: 8px; pointer-events: none;
            z-index: 10;
        }
        #countdown {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-size: 60px; font-weight: bold; color: #fff; text-shadow: 4px 4px 0px #000;
            pointer-events: none; text-align: center; z-index: 10; width: 80%;
        }
        #turbo-ui {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            font-size: 28px; font-weight: bold; color: #fff; text-shadow: 2px 2px 4px #000;
            text-align: center; pointer-events: none; z-index: 10;
        }
        .item-box-ui {
            width: 80px; height: 80px; border: 4px solid #fff; background: rgba(0,0,0,0.5);
            display: inline-block; vertical-align: middle; margin: 5px; position: relative;
            border-radius: 10px; box-shadow: inset 0 0 15px rgba(255,255,255,0.3);
        }
        .item-box-ui span {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 44px;
        }
        #lap-text, #speed-text, #coin-text, #rank-text { margin-bottom: 8px; font-size: 20px; }
        #rank-text { font-size: 30px; color: #ffeb3b; text-shadow: 2px 2px 0px #000; }
        #mini-map {
            position: absolute; bottom: 20px; right: 20px; width: 220px; height: 220px;
            background: rgba(0,0,0,0.7); border: 3px solid #555; border-radius: 10px; z-index: 10;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="ui-container">
        <div id="rank-text">12位 / 12</div>
        <div id="lap-text">LAP: 1/3</div>
        <div id="coin-text">🪙 COINS: 0</div>
        <div id="speed-text">SPEED: 0 km/h</div>
        <div>
            <div class="item-box-ui" id="box-1"><span></span></div>
            <div class="item-box-ui" id="box-2"><span></span></div>
        </div>
    </div>
    <div id="countdown">3</div>
    <div id="turbo-ui"></div>
    <canvas id="mini-map"></canvas>

    <script>
        // --- 1. 基本設定＆グローバル変数 ---
        const width = window.innerWidth, height = window.innerHeight;
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x1a0f2e, 0.0025);

        const camera = new THREE.PerspectiveCamera(60, width / height, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(width, height);
        renderer.setClearColor(0x110822, 1);
        document.body.appendChild(renderer.domElement);

        // ライティング
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffddaa, 0.8);
        dirLight.position.set(200, 300, 100);
        scene.add(dirLight);
        const pointLight = new THREE.PointLight(0xffaa00, 1.2, 500);
        pointLight.position.set(0, 50, 0);
        scene.add(pointLight);

        // 音声効果 (AudioContext)
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        function playTone(freq, type, duration, vol=0.1) {
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }
        function soundCoin() { playTone(987.77, 'sine', 0.15, 0.15); setTimeout(()=>playTone(1318.51, 'sine', 0.3, 0.15), 80); }
        function soundItem() { playTone(523.25, 'triangle', 0.1, 0.2); setTimeout(()=>playTone(659.25, 'triangle', 0.1, 0.2), 60); setTimeout(()=>playTone(783.99, 'triangle', 0.2, 0.2), 120); }
        function soundHit() { playTone(150, 'sawtooth', 0.5, 0.3); }
        function soundBoost() { playTone(880, 'sawtooth', 0.3, 0.2); }
        function soundCount() { playTone(440, 'sine', 0.3, 0.2); }
        function soundGo() { playTone(880, 'sine', 0.8, 0.3); }

        // ゲーム状態
        let gameActive = false, countdown = 3, gameFinished = false;
        let speed = 0, targetSpeed = 0, angle = 0, posX = 0, posZ = 350;
        let coins = 0, lap = 1, currentLapProgress = 0, totalProgress = 0;
        let isSquishedTimer = 0, playerHitInvincibleTimer = 0;

        // アイテムスロット (最大2枠)
        let heldItems = [null, null];
        let rouletteTimer = 0, rouletteIndex = 0;

        // アイテム有効タイマー
        let itemMushroomTimer = 0, itemGoldenTimer = 0, itemMegaTimer = 0, itemStarTimer = 0, itemBooTimer = 0;

        // UI取得
        const countdownUI = document.getElementById("countdown");
        const lapText = document.getElementById("lap-text");
        const coinText = document.getElementById("coin-text");
        const speedText = document.getElementById("speed-text");
        const rankText = document.getElementById("rank-text");
        const turboText = document.getElementById("turbo-ui");

        // コインモデル用配列
        let coinObjects = [];

        // --- 2. 工場デザインの3Dコース設計 (超強化・高難易度) ---
        // コースは楕円ベース（外周約1600ユニット）
        const NODE_COUNT = 240;
        let trackNodes = [], wallLeftNodes = [], wallRightNodes = [];
        let npcPathNodes = [];

        for (let i = 0; i < NODE_COUNT; i++) {
            let t = (i / NODE_COUNT) * Math.PI * 2;
            let rx = 350 + 120 * Math.cos(t * 3); // 複雑なうねうね
            let rz = 250 + 80 * Math.sin(t * 2);
            let x = Math.cos(t) * rx;
            let z = Math.sin(t) * rz;
            trackNodes.push(new THREE.Vector3(x, 0, z));
            npcPathNodes.push(new THREE.Vector3(x, 0, z));

            // 法線ベクトルを計算してコース幅（40ユニット）の外壁、内壁を設定
            let nextT = ((i+1) / NODE_COUNT) * Math.PI * 2;
            let nx = Math.cos(nextT) * (350 + 120 * Math.cos(nextT * 3));
            let nz = Math.sin(nextT) * (250 + 80 * Math.sin(nextT * 2));
            let dx = nx - x, dz = nz - z;
            let len = Math.sqrt(dx*dx + dz*dz);
            let ux = -dz / len, uz = dx / len; // 法線

            wallLeftNodes.push(new THREE.Vector3(x + ux * 22, 0, z + uz * 22));
            wallRightNodes.push(new THREE.Vector3(x - ux * 22, 0, z - uz * 22));
        }

        // コース路面と壁のメッシュ生成
        const trackGeometry = new THREE.BufferGeometry();
        const wallGeometry = new THREE.BufferGeometry();
        let trackVertices = [], wallVertices = [], trackColors = [];

        const colorFloorDark = new THREE.Color(0x1a1a24), colorFloorLight = new THREE.Color(0x2a2a35);
        const colorWall = new THREE.Color(0x403d39);

        for (let i = 0; i < NODE_COUNT; i++) {
            let next = (i + 1) % NODE_COUNT;
            let pL = wallLeftNodes[i], pR = wallRightNodes[i];
            let nL = wallLeftNodes[next], nR = wallRightNodes[next];

            // 路面（2つのポリゴンで四角形を作る）
            trackVertices.push(pL.x, pL.y, pL.z); trackVertices.push(pR.x, pR.y, pR.z); trackVertices.push(nL.x, nL.y, nL.z);
            trackVertices.push(pR.x, pR.y, pR.z); trackVertices.push(nR.x, nR.y, nR.z); trackVertices.push(nL.x, nL.y, nL.z);

            // 縞模様カラー
            let c = (Math.floor(i / 2) % 2 === 0) ? colorFloorDark : colorFloorLight;
            for(let j=0; j<6; j++) { trackColors.push(c.r, c.g, c.b); }

            // 左壁
            wallVertices.push(pL.x, pL.y, pL.z); wallVertices.push(pL.x, pL.y + 12, pL.z); wallVertices.push(nL.x, nL.y + 12, nL.z);
            wallVertices.push(pL.x, pL.y, pL.z); wallVertices.push(nL.x, nL.y + 12, nL.z); wallVertices.push(nL.x, nL.y, nL.z);
            // 右壁
            wallVertices.push(pR.x, pR.y, pR.z); wallVertices.push(nR.x, nR.y, nR.z); wallVertices.push(nR.x, nR.y + 12, nR.z);
            wallVertices.push(pR.x, pR.y, pR.z); wallVertices.push(nR.x, nR.y + 12, nR.z); wallVertices.push(pR.x, pR.y + 12, pR.z);
        }

        trackGeometry.setAttribute('position', new THREE.Float32BufferAttribute(trackVertices, 3));
        trackGeometry.setAttribute('color', new THREE.Float32BufferAttribute(trackColors, 3));
        trackGeometry.computeVertexNormals();
        const trackMat = new THREE.MeshStandardMaterial({ vertexColors: true, roughness: 0.5, metalness: 0.6 });
        const trackMesh = new THREE.Mesh(trackGeometry, trackMat);
        scene.add(trackMesh);

        wallGeometry.setAttribute('position', new THREE.Float32BufferAttribute(wallVertices, 3));
        wallGeometry.computeVertexNormals();
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x444455, roughness: 0.4, metalness: 0.8 });
        const wallMesh = new THREE.Mesh(wallGeometry, wallMat);
        scene.add(wallMesh);

        // スタート・フィニッシュラインのアーチ
        const startNode = trackNodes[0], startLeft = wallLeftNodes[0], startRight = wallRightNodes[0];
        const archGeo = new THREE.BoxGeometry(4, 30, 4);
        const archMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, metalness: 0.9, roughness: 0.1 });
        const archL = new THREE.Mesh(archGeo, archMat); archL.position.set(startLeft.x, 15, startLeft.z); scene.add(archL);
        const archR = new THREE.Mesh(archGeo, archMat); archR.position.set(startRight.x, 15, startRight.z); scene.add(archR);
        const archBarGeo = new THREE.BoxGeometry(45, 4, 4);
        const archBar = new THREE.Mesh(archBarGeo, archMat); archBar.position.set(startNode.x, 30, startNode.z); scene.add(archBar);

        // 工場ギミック：巨大な歯車 (障害物として回転)
        const gears = [];
        const gearMat = new THREE.MeshStandardMaterial({ color: 0x777788, roughness: 0.2, metalness: 0.9 });
        for (let i = 1; i <= 6; i++) {
            let nodeIdx = Math.floor((NODE_COUNT / 7) * i);
            let pos = trackNodes[nodeIdx];
            let gearGeo = new THREE.CylinderGeometry(15, 15, 3, 12);
            let gear = new THREE.Mesh(gearGeo, gearMat);
            gear.position.set(pos.x + (i%2===0?6:-6), 1.5, pos.z);
            scene.add(gear);
            gears.push({ mesh: gear, speed: 0.02 * (i%2===0?1:-1), radius: 15 });
        }

        // 工場ギミック：超危険なプレス機 (上下に動き、潰されるとスピン・コインロスト)
        const smashers = [];
        const smasherMat = new THREE.MeshStandardMaterial({ color: 0xff3333, emissive: 0x330000, metalness: 0.8, roughness: 0.1 });
        for (let i = 1; i <= 5; i++) {
            let nodeIdx = Math.floor((NODE_COUNT / 6) * i + 10);
            let pos = trackNodes[nodeIdx];
            let smasherGeo = new THREE.BoxGeometry(16, 12, 16);
            let smasher = new THREE.Mesh(smasherGeo, smasherMat);
            smasher.position.set(pos.x, 15, pos.z);
            scene.add(smasher);
            smashers.push({ mesh: smasher, baseY: 15, offset: Math.random() * Math.PI, nodeIndex: nodeIdx });
        }

        // --- 3. アイテムボックス＆コイン配置 ---
        const itemBoxes = [];
        const boxGeo = new THREE.BoxGeometry(4, 4, 4);
        const boxMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, transparent: true, opacity: 0.75, roughness: 0, metalness: 0.9 });

        // コース上に等間隔でアイテムボックスを配置
        for (let i = 0; i < NODE_COUNT; i += 30) {
            let pL = wallLeftNodes[i], pR = wallRightNodes[i];
            // 1カ所に2つ横並び
            let b1 = new THREE.Mesh(boxGeo, boxMat); b1.position.set(pL.x * 0.4 + pR.x * 0.6, 2.5, pL.z * 0.4 + pR.z * 0.6); scene.add(b1);
            let b2 = new THREE.Mesh(boxGeo, boxMat); b2.position.set(pL.x * 0.6 + pR.x * 0.4, 2.5, pL.z * 0.6 + pR.z * 0.4); scene.add(b2);
            itemBoxes.push({ mesh: b1, active: true, respawn: 0 }, { mesh: b2, active: true, respawn: 0 });
        }

        // コイン配置
        const coinGeo = new THREE.CylinderGeometry(1.5, 1.5, 0.4, 8);
        coinGeo.rotateX(Math.PI / 2);
        const coinMat = new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.9, roughness: 0.1 });
        for (let i = 5; i < NODE_COUNT; i += 8) {
            if (i % 30 === 0) continue; // アイテムボックス付近は避ける
            let pL = wallLeftNodes[i], pR = wallRightNodes[i];
            let coin = new THREE.Mesh(coinGeo, coinMat);
            let ratio = 0.3 + Math.random() * 0.4;
            coin.position.set(pL.x * ratio + pR.x * (1 - ratio), 1.5, pL.z * ratio + pR.z * (1 - ratio));
            scene.add(coin);
            coinObjects.push({ mesh: coin, active: true, respawn: 0, ox: coin.position.x, oz: coin.position.z });
        }

        // 被弾時用の「散らばるコイン」プール
        const scatteredCoins = [];
        for (let i = 0; i < 20; i++) {
            let sCoin = new THREE.Mesh(coinGeo, coinMat);
            sCoin.visible = false;
            scene.add(sCoin);
            scatteredCoins.push({ mesh: sCoin, vx: 0, vz: 0, life: 0 });
        }

        function dropCoins() {
            let count = Math.min(coins, 3); // 最大3枚ロスト
            coins -= count;
            coinText.innerText = `🪙 COINS: ${coins}`;
            let spawned = 0;
            for (let sc of scatteredCoins) {
                if (spawned >= count) break;
                if (!sc.mesh.visible) {
                    sc.mesh.position.set(posX + (Math.random()-0.5)*4, 1.2, posZ + (Math.random()-0.5)*4);
                    let angleRand = Math.random() * Math.PI * 2;
                    let spd = 1.0 + Math.random() * 1.5;
                    sc.vx = Math.cos(angleRand) * spd;
                    sc.vz = Math.sin(angleRand) * spd;
                    sc.life = 180; // 3秒間存在
                    sc.mesh.visible = true;
                    spawned++;
                }
            }
        }

        // --- 4. プレイヤーカート ＆ NPCライバルカート (超強力対戦相手) ---
        // プレイヤーカート
        const cartGroup = new THREE.Group();
        const baseGeo = new THREE.BoxGeometry(4, 1.5, 6);
        const baseMat = new THREE.MeshStandardMaterial({ color: 0x3388ff, metalness: 0.8, roughness: 0.2 });
        const baseMesh = new THREE.Mesh(baseGeo, baseMat);
        baseMesh.position.y = 0.75;
        cartGroup.add(baseMesh);

        // タイヤ
        const wheelGeo = new THREE.CylinderGeometry(1, 1, 0.8, 12);
        wheelGeo.rotateZ(Math.PI / 2);
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
        const wheels = [
            new THREE.Mesh(wheelGeo, wheelMat), new THREE.Mesh(wheelGeo, wheelMat),
            new THREE.Mesh(wheelGeo, wheelMat), new THREE.Mesh(wheelGeo, wheelMat)
        ];
        wheels[0].position.set(-2.2, 0.7, 2);  wheels[1].position.set(2.2, 0.7, 2);
        wheels[2].position.set(-2.2, 0.7, -2); wheels[3].position.set(2.2, 0.7, -2);
        wheels.forEach(w => cartGroup.add(w));

        scene.add(cartGroup);
        cartGroup.position.set(posX, 0, posZ);

        // NPCカート定義 (11台)
        const npcs = [];
        const npcColors = [
            0xff3333, 0x33ff33, 0xffff33, 0xff33ff, 0x33ffff,
            0xff8800, 0x8800ff, 0xff0088, 0x00ff88, 0x0088ff, 0xaa66cc
        ];

        for (let i = 0; i < 11; i++) {
            let nGroup = new THREE.Group();
            let nMat = new THREE.MeshStandardMaterial({ color: npcColors[i], metalness: 0.8, roughness: 0.2 });
            let nBase = new THREE.Mesh(baseGeo, nMat);
            nBase.position.y = 0.75;
            nGroup.add(nBase);

            let nw1 = new THREE.Mesh(wheelGeo, wheelMat); nw1.position.set(-2.2, 0.7, 2); nGroup.add(nw1);
            let nw2 = new THREE.Mesh(wheelGeo, wheelMat); nw2.position.set(2.2, 0.7, 2); nGroup.add(nw2);
            let nw3 = new THREE.Mesh(wheelGeo, wheelMat); nw3.position.set(-2.2, 0.7, -2); nGroup.add(nw3);
            let nw4 = new THREE.Mesh(wheelGeo, wheelMat); nw4.position.set(2.2, 0.7, -2); nGroup.add(nw4);

            scene.add(nGroup);

            // スタート位置をコース後方に分散配置
            let startNodeIndex = (NODE_COUNT - 5 - i * 3) % NODE_COUNT;
            let startPos = trackNodes[startNodeIndex];

            npcs.push({
                mesh: nGroup,
                color: npcColors[i],
                progress: startNodeIndex / NODE_COUNT,
                lap: 1,
                rank: 12,
                speed: 0,
                baseSpeedLimit: 2.2 + Math.random() * 0.25, // プロ仕様：NPCの基本速度アップ
                targetSpeed: 0,
                heldItem: null,
                itemUseTimer: 0,
                isMega: 0,
                isStar: 0,
                isSquished: 0,
                stuckTimer: 0
            });
        }

        // --- 5. プレイヤー用アイテムロジック ---
        // アイテムスロット獲得
        function givePlayerItem() {
            soundItem();
            if (heldItems[0] === null) {
                rouletteTimer = 100;
            } else if (heldItems[1] === null) {
                rouletteTimer = 100;
            }
        }

        // アイテム抽選ロジック (順位に応じて確率完全変動)
        const itemTypes = ["キノコ", "緑甲羅", "赤甲羅", "サンダー", "デカキノコ", "金キノコ", "スター", "テレサ"];

        function getRandomItemByRank(playerRank) {
            let pool = [];
            if (playerRank === 1) {
                // 1位 [🟢緑甲羅、コイン、キノコ1枚のみ]
                pool = ["キノコ", "緑甲羅", "緑甲羅", "緑甲羅"];
            } else if (playerRank <= 3) {
                // 2〜3位 [🔴赤甲羅、キノコがメイン]
                pool = ["キノコ", "キノコ", "緑甲羅", "赤甲羅", "デカキノコ"];
            } else if (playerRank <= 7) {
                // 4〜7位 [⭐スター、デカキノコ、テレサ出現開始]
                pool = ["キノコ", "赤甲羅", "赤甲羅", "デカキノコ", "デカキノコ", "金キノコ", "スター", "テレサ"];
            } else {
                // 下位 (8位〜12位) [🚀キラー高確率出現]
                pool = ["金キノコ", "スター", "スター", "サンダー", "テレサ"];
            }
            return pool[Math.floor(Math.random() * pool.length)];
        }

        function updateRoulette() {
            if (rouletteTimer > 0) {
                rouletteTimer--;
                rouletteIndex = (rouletteIndex + 1) % itemTypes.length;
                let displayItem = itemTypes[rouletteIndex];
                let emoji = getItemEmoji(displayItem);

                if (heldItems[0] === null) {
                    document.getElementById("box-1").innerHTML = `<span>${emoji}</span>`;
                } else if (heldItems[1] === null) {
                    document.getElementById("box-2").innerHTML = `<span>${emoji}</span>`;
                }

                if (rouletteTimer === 0) {
                    // ルーレット終了。最終順位に基づき抽選
                    let finalItem = getRandomItemByRank(playerRank);
                    if (heldItems[0] === null) {
                        heldItems[0] = finalItem;
                    } else if (heldItems[1] === null) {
                        heldItems[1] = finalItem;
                    }
                    updateItemUI();
                }
            }
        }

        function getItemEmoji(item) {
            switch(item) {
                case "キノコ": return "🍄";
                case "緑甲羅": return "🟢";
                case "赤甲羅": return "🔴";
                case "サンダー": return "⚡";
                case "デカキノコ": return "🍠";
                case "金キノコ": return "👑";
                case "スター": return "⭐";
                case "テレサ": return "👻";
                default: return "";
            }
        }

        function updateItemUI() {
            document.getElementById("box-1").innerHTML = `<span>${getItemEmoji(heldItems[0])}</span>`;
            document.getElementById("box-2").innerHTML = `<span>${getItemEmoji(heldItems[1])}</span>`;
        }

        // アイテム使用処理
        function useItem(slotIndex) {
            let item = heldItems[slotIndex];
            if (!item) return;

            // 使用したスロットを空けて、必要なら左に詰める
            heldItems[slotIndex] = null;
            if (slotIndex === 0 && heldItems[1] !== null) {
                heldItems[0] = heldItems[1];
                heldItems[1] = null;
            }
            updateItemUI();

            turboText.innerText = `【使用】 ${item} ！！`;
            turboText.style.color = "#4fffcb";

            switch(item) {
                case "キノコ":
                    applyBoost(120, 4.5); // 2秒間急加速
                    break;
                case "金キノコ":
                    itemGoldenTimer = 300; // 5秒間金キノコ使い放題
                    applyBoost(60, 4.5);
                    break;
                case "デカキノコ":
                    itemMegaTimer = 360; // 6秒間デカキノコ
                    cartGroup.scale.set(2.5, 2.5, 2.5);
                    playTone(300, "sine", 0.5, 0.3);
                    break;
                case "スター":
                    itemStarTimer = 450; // 7.5秒間スター無敵
                    applyBoost(450, 3.8);
                    break;
                case "緑甲羅":
                    fireGreenShell();
                    break;
                case "赤甲羅":
                    fireRedShell();
                    break;
                case "サンダー":
                    useThunder();
                    break;
                case "テレサ":
                    useBoo();
                    break;
            }
        }

        function applyBoost(duration, power) {
            soundBoost();
            targetSpeed = power;
            speed = power;
            // 簡易エフェクト
            pointLight.color.setHex(0xff00ff);
            setTimeout(()=>pointLight.color.setHex(0xffaa00), duration * 16);
        }

        // --- 6. 3Dアイテム挙動（甲羅・サンダーなど） ---
        const activeShells = [];

        function fireGreenShell() {
            const shellGeo = new THREE.SphereGeometry(1.5, 8, 8);
            const shellMat = new THREE.MeshStandardMaterial({ color: 0x22ff22, roughness: 0.1, metalness: 0.9 });
            const mesh = new THREE.Mesh(shellGeo, shellMat);
            mesh.position.set(posX, 1.2, posZ);
            scene.add(mesh);

            // プレイヤーの進行方向に真っ直ぐ飛ばす
            let vx = Math.sin(angle) * 3.5;
            let vz = Math.cos(angle) * 3.5;

            activeShells.push({ mesh: mesh, vx: vx, vz: vz, type: "green", life: 300 });
            playTone(400, "square", 0.2);
        }

        function fireRedShell() {
            // 赤甲羅はターゲット（前方のNPC）を追尾
            let targetNpc = findNearestAheadNpc();
            const shellGeo = new THREE.SphereGeometry(1.5, 8, 8);
            const shellMat = new THREE.MeshStandardMaterial({ color: 0xff2222, roughness: 0.1, metalness: 0.9 });
            const mesh = new THREE.Mesh(shellGeo, shellMat);
            mesh.position.set(posX, 1.2, posZ);
            scene.add(mesh);

            activeShells.push({ mesh: mesh, type: "red", target: targetNpc, life: 300 });
            playTone(450, "square", 0.2);
        }

        function findNearestAheadNpc() {
            // プレイヤーの進行方向、もっとも距離の近いNPCを探す
            let minDistance = 150;
            let target = null;
            for (let npc of npcs) {
                let dx = npc.mesh.position.x - posX;
                let dz = npc.mesh.position.z - posZ;
                let dist = Math.sqrt(dx*dx + dz*dz);
                if (dist < minDistance) {
                    minDistance = dist;
                    target = npc;
                }
            }
            return target;
        }

        function useThunder() {
            playTone(1500, "sawtooth", 1.0, 0.4);
            pointLight.color.setHex(0xffffff);
            pointLight.intensity = 10;
            setTimeout(() => { pointLight.color.setHex(0xffaa00); pointLight.intensity = 1.2; }, 150);

            turboText.innerText = "⚡ サンダー発動！ライバル達を縮小化！ ⚡";
            turboText.style.color = "#ffff00";

            // 全てのライバル（スター状態・キラー状態を除く）を縮小＆スピン
            npcs.forEach(npc => {
                if (npc.isStar <= 0) {
                    npc.isSquished = 180; // 3秒縮小
                    npc.speed = 0.5;
                    npc.mesh.scale.set(0.4, 0.4, 0.4);
                }
            });
        }

        function useBoo() {
            soundItem();
            itemBooTimer = 180; // 3秒間無形化
            // 敵からアイテムをランダムに奪う
            let hasItemNpcs = npcs.filter(n => n.heldItem !== null);
            if (hasItemNpcs.length > 0) {
                let target = hasItemNpcs[Math.floor(Math.random() * hasItemNpcs.length)];
                let stolen = target.heldItem;
                target.heldItem = null;

                if (heldItems[0] === null) { heldItems[0] = stolen; }
                else if (heldItems[1] === null) { heldItems[1] = stolen; }
                updateItemUI();

                turboText.innerText = `👻 テレサがアイテム『${stolen}』を奪い取ってきた！ 👻`;
                turboText.style.color = "#aaaaaa";
            } else {
                turboText.innerText = "👻 テレサが探索したが、敵はアイテムを持っていなかった！ 👻";
            }
        }

        // --- 7. NPC用AIアイテム処理 ---
        function useNpcItem(npc) {
            let item = npc.heldItem;
            if (!item) return;

            if (item === "キノコ") {
                npc.speed = npc.baseSpeedLimit * 1.5;
            } else if (item === "デカキノコ") {
                npc.isMega = 300;
                npc.mesh.scale.set(2.5, 2.5, 2.5);
            } else if (item === "スター") {
                npc.isStar = 300;
            } else if (item === "サンダー") {
                // 確率でプレイヤーに直撃
                if (itemStarTimer <= 0 && itemBooTimer <= 0 && playerHitInvincibleTimer <= 0) {
                    isSquishedTimer = 180;
                    speed = 1.0;
                    dropCoins();
                    turboText.innerText = "⚡ 敵のサンダーが直撃！縮んでコインを失った！ ⚡";
                    turboText.style.color = "#ffff33";
                }
            } else if (npc.heldItem === "テレサ") {
                npc.heldItem = null;
                // テレサ発動処理（プレイヤーのアイテムを奪う）
                let currentHeldItem = heldItems[0] || heldItems[1];
                if (currentHeldItem !== null && playerHitInvincibleTimer <= 0) {
                    currentHeldItem = null;
                    turboText.innerText = "👻 テレサにアイテムを奪われた！ 👻"; turboText.style.color = "#aaaaaa";
                }
                return;
            }

            if (npc.heldItem === "スター") {
                npc.isStar = 300; npc.heldItem = null;
                return;
            }

            npc.heldItem = null;
        }

        // --- 8. 入力処理＆キー監視 ---
        const keys = { w: false, s: false, a: false, d: false, Space: false, KeyE: false };
        window.addEventListener('keydown', e => {
            initAudio();
            if (e.code === 'KeyW' || e.code === 'ArrowUp') keys.w = true;
            if (e.code === 'KeyS' || e.code === 'ArrowDown') keys.s = true;
            if (e.code === 'KeyA' || e.code === 'ArrowLeft') keys.a = true;
            if (e.code === 'KeyD' || e.code === 'ArrowRight') keys.d = true;
            if (e.code === 'Space') {
                if (heldItems[0] !== null && rouletteTimer === 0) { useItem(0); }
            }
            if (e.code === 'KeyE') {
                if (heldItems[1] !== null && rouletteTimer === 0) { useItem(1); }
            }
        });
        window.addEventListener('keyup', e => {
            if (e.code === 'KeyW' || e.code === 'ArrowUp') keys.w = false;
            if (e.code === 'KeyS' || e.code === 'ArrowDown') keys.s = false;
            if (e.code === 'KeyA' || e.code === 'ArrowLeft') keys.a = false;
            if (e.code === 'KeyD' || e.code === 'ArrowRight') keys.d = false;
        });

        // --- 9. ゲームループ＆物理演算・衝突判定 ---
        const clock = new THREE.Clock();

        // 進行度（進捗）を距離ベースで近似計算するためのヘルパー
        function getProgressByPosition(pos) {
            let minDistance = 999999;
            let closestNodeIdx = 0;
            for (let i = 0; i < NODE_COUNT; i++) {
                let dist = pos.distanceTo(trackNodes[i]);
                if (dist < minDistance) { minDistance = dist; closestNodeIdx = i; }
            }
            return closestNodeIdx / NODE_COUNT;
        }

        let playerRank = 12;

        function updateGame() {
            if (!gameActive) return;

            // プレイヤー物理運動
            let speedLimit = 2.4; // プロ難易度基本最高速
            if (isSquishedTimer > 0) {
                speedLimit = 1.0;
                isSquishedTimer--;
                cartGroup.scale.set(0.4, 0.4, 0.4);
            } else {
                cartGroup.scale.set(1, 1, 1);
            }

            // 特殊アイテム加速状態
            if (itemMushroomTimer > 0) { speedLimit = 4.5; itemMushroomTimer--; }
            if (itemGoldenTimer > 0) {
                speedLimit = 4.5;
                itemGoldenTimer--;
                if (keys.w && Math.random() < 0.1) applyBoost(10, 4.5); // 金キノコ継続中
            }
            if (itemStarTimer > 0) { speedLimit = 3.8; itemStarTimer--; }
            if (itemMegaTimer > 0) { speedLimit = 3.2; itemMegaTimer--; if(itemMegaTimer===0) cartGroup.scale.set(1,1,1); }
            if (itemBooTimer > 0) { itemBooTimer--; }
            if (playerHitInvincibleTimer > 0) { playerHitInvincibleTimer--; }

            // 走破処理
            if (keys.w) {
                speed = THREE.MathUtils.lerp(speed, speedLimit, 0.05);
            } else if (keys.s) {
                speed = THREE.MathUtils.lerp(speed, -1.0, 0.05);
            } else {
                speed = THREE.MathUtils.lerp(speed, 0, 0.1);
            }

            if (keys.a) angle += 0.035;
            if (keys.d) angle -= 0.035;

            posX += Math.sin(angle) * speed;
            posZ += Math.cos(angle) * speed;
            cartGroup.position.set(posX, 0, posZ);
            cartGroup.rotation.y = angle;

            // プレイヤーのコースアウト防止 (外壁・内壁への衝突)
            let currentProg = getProgressByPosition(cartGroup.position);
            let currentIdx = Math.floor(currentProg * NODE_COUNT);
            let leftWall = wallLeftNodes[currentIdx], rightWall = wallRightNodes[currentIdx];
            let pCenter = trackNodes[currentIdx];

            let distL = cartGroup.position.distanceTo(leftWall);
            let distR = cartGroup.position.distanceTo(rightWall);
            let roadWidth = leftWall.distanceTo(rightWall);

            // コース限界制御
            if (cartGroup.position.distanceTo(pCenter) > roadWidth / 2 - 2) {
                // 反発
                let pushDir = new THREE.Vector3().subVectors(pCenter, cartGroup.position).normalize();
                posX += pushDir.x * 1.5;
                posZ += pushDir.z * 1.5;
                speed *= 0.4; // 衝突減速
                playTone(180, "triangle", 0.15, 0.1);
            }

            // プレイヤー進捗＆周回判定
            let lastProg = currentLapProgress;
            currentLapProgress = currentProg;
            if (lastProg > 0.85 && currentLapProgress < 0.15) {
                lap++;
                if (lap > 3) {
                    gameFinished = true;
                    gameActive = false;
                    turboText.innerText = `🏁 FINISH!! 最終順位: ${playerRank}位 🏁`;
                    turboText.style.color = "#ffd700";
                    playTone(587.33, 'sine', 1.5);
                } else {
                    lapText.innerText = `LAP: ${lap}/3`;
                    playTone(880, 'sine', 0.5);
                }
            }
            totalProgress = (lap - 1) + currentLapProgress;

            // コインの自転アニメーション＆衝突判定
            coinObjects.forEach(coin => {
                if (coin.active) {
                    coin.mesh.rotation.y += 0.04;
                    if (cartGroup.position.distanceTo(coin.mesh.position) < 3.5) {
                        coin.active = false;
                        coin.mesh.visible = false;
                        coin.respawn = 300; // 5秒で復活
                        coins++;
                        coinText.innerText = `🪙 COINS: ${coins}`;
                        soundCoin();
                    }
                } else {
                    coin.respawn--;
                    if (coin.respawn <= 0) {
                        coin.active = true;
                        coin.mesh.visible = true;
                    }
                }
            });

            // 散らばったコインの物理挙動
            scatteredCoins.forEach(sc => {
                if (sc.mesh.visible) {
                    sc.mesh.position.x += sc.vx;
                    sc.mesh.position.z += sc.vz;
                    sc.vx *= 0.95; sc.vz *= 0.95; // 摩擦減速
                    sc.mesh.rotation.y += 0.08;
                    sc.life--;

                    // 再回収判定 (射出直後1秒は拾えない)
                    if (sc.life < 120 && cartGroup.position.distanceTo(sc.mesh.position) < 3.5) {
                        sc.mesh.visible = false;
                        coins++;
                        coinText.innerText = `🪙 COINS: ${coins}`;
                        soundCoin();
                    }
                    if (sc.life <= 0) sc.mesh.visible = false;
                }
            });

            // アイテムボックスの回転と衝突
            itemBoxes.forEach(box => {
                if (box.active) {
                    box.mesh.rotation.x += 0.02; box.mesh.rotation.y += 0.03;
                    if (cartGroup.position.distanceTo(box.mesh.position) < 3.5) {
                        box.active = false;
                        box.mesh.visible = false;
                        box.respawn = 360; // 6秒でリスポーン
                        givePlayerItem();
                    }
                } else {
                    box.respawn--;
                    if (box.respawn <= 0) {
                        box.active = true;
                        box.mesh.visible = true;
                    }
                }
            });

            // ギミック：巨大歯車障害物の回転＆接触
            gears.forEach(gear => {
                gear.mesh.rotation.y += gear.speed;
                if (cartGroup.position.distanceTo(gear.mesh.position) < gear.radius + 1.5) {
                    if (itemStarTimer <= 0 && playerHitInvincibleTimer <= 0) {
                        speed = -0.5;
                        isSquishedTimer = 60; // 1秒怯み
                        dropCoins();
                        soundHit();
                        turboText.innerText = "💥 巨大歯車に接触！！コインを落とした！ 💥";
                        turboText.style.color = "#ff5555";
                    }
                }
            });

            // ギミック：超危険プレス機（上下ピストン運動）
            let time = clock.getElapsedTime();
            smashers.forEach(smasher => {
                let y = smasher.baseY + Math.sin(time * 3 + smasher.offset) * 14;
                smasher.mesh.position.y = Math.max(1.5, y); // 地面に激突

                // 地面に密着した時に足元にいたらプレス被弾
                if (smasher.mesh.position.y < 3.0) {
                    let d = cartGroup.position.distanceTo(new THREE.Vector3(smasher.mesh.position.x, 0, smasher.mesh.position.z));
                    if (d < 10) {
                        if (itemStarTimer <= 0 && playerHitInvincibleTimer <= 0) {
                            isSquishedTimer = 120; // 2秒間超潰され状態
                            speed = 0.1;
                            dropCoins();
                            soundHit();
                            turboText.innerText = "🚨 プレス機に潰された！！超絶スピードダウン！ 🚨";
                            turboText.style.color = "#ff0000";
                        }
                    }
                }
            });

            // 3Dアイテム（甲羅）挙動管理
            for (let i = activeShells.length - 1; i >= 0; i--) {
                let shell = activeShells[i];
                shell.life--;

                if (shell.type === "green") {
                    shell.mesh.position.x += shell.vx;
                    shell.mesh.position.z += shell.vz;
                } else if (shell.type === "red" && shell.target) {
                    // 追尾物理
                    let targetPos = shell.target.mesh.position;
                    let dir = new THREE.Vector3().subVectors(targetPos, shell.mesh.position).normalize();
                    shell.mesh.position.addScaledVector(dir, 2.5);
                }

                // 壁反発または消滅
                let sProg = getProgressByPosition(shell.mesh.position);
                let sIdx = Math.floor(sProg * NODE_COUNT);
                let sCenter = trackNodes[sIdx];
                let sWidth = wallLeftNodes[sIdx].distanceTo(wallRightNodes[sIdx]);

                if (shell.mesh.position.distanceTo(sCenter) > sWidth / 2 || shell.life <= 0) {
                    scene.remove(shell.mesh);
                    activeShells.splice(i, 1);
                    continue;
                }

                // NPCへの命中判定
                npcs.forEach(npc => {
                    if (shell.mesh.position.distanceTo(npc.mesh.position) < 4.0) {
                        if (npc.isStar <= 0) {
                            npc.speed = 0;
                            npc.isSquished = 120; // 撃墜
                            playTone(200, "square", 0.4);
                        }
                        scene.remove(shell.mesh);
                        activeShells.splice(i, 1);
                    }
                });
            }

            // --- 10. NPC高度自律シミュレーション＆高度AI走行 ---
            npcs.forEach((npc, index) => {
                let nSpeed = npc.speed;
                let targetMax = npc.baseSpeedLimit;

                // 被弾・異常状態リカバリ
                if (npc.isSquished > 0) {
                    npc.isSquished--;
                    targetMax = 0.5;
                }
                if (npc.isStar > 0) {
                    npc.isStar--;
                    targetMax *= 1.6;
                }

                // 進捗更新
                npc.speed = THREE.MathUtils.lerp(npc.speed, targetMax, 0.05);
                nSpeed = npc.speed * 0.00065; // 速度スケール微調整

                // アイテムランダム獲得・使用
                if (!npc.heldItem && Math.random() < 0.0015) {
                    npc.heldItem = getRandomItemByRank(npc.rank);
                    npc.itemUseTimer = 180 + Math.random() * 240;
                }

                // プレイヤーとNPCの接触判定 (体当たり、ハネ飛ばし)
                let dToPlayer = cartGroup.position.distanceTo(npc.mesh.position);
                if (dToPlayer < 4.0) {
                    // スター保持プレイヤーがハネ飛ばす
                    if (itemStarTimer > 0 && npc.isStar <= 0) {
                        npc.speed = 0; npc.isSquished = 150;
                    }
                    // スターNPCがプレイヤーをハネ飛ばす
                    else if (npc.isStar > 0 && itemStarTimer <= 0) {
                        if (itemBooTimer <= 0 && isSquishedTimer <= 0 && playerHitInvincibleTimer <= 0) {
                            isSquishedTimer = 60; speed = 0; itemMushroomTimer = 0; itemGoldenTimer = 0;
                            playerHitInvincibleTimer = 180; 
                            soundHit(); 
                            dropCoins(); // ❌ 通常被弾時はコインロストのみ
                            turboText.innerText = "💥 スター状態のライバルにハネ飛ばされた！！コインを失った！ 💥"; turboText.style.color = "#ff3333";
                        }
                    }
                }
                npc.progress += nSpeed; if (npc.progress >= 1) { npc.progress -= 1; npc.lap++; }
                if (npc.heldItem) { npc.itemUseTimer--; if (npc.itemUseTimer <= 0) { useNpcItem(npc); } }
            });
            let p = Math.max(0, npc.progress);
            let segment = Math.floor(p * NODE_COUNT); let segmentPercent = (p * NODE_COUNT) % 1;
            let startNode = npcPathNodes[segment % NODE_COUNT]; let endNode = npcPathNodes[(segment + 1) % NODE_COUNT];
            npc.mesh.position.set(startNode.x + (endNode.x - startNode.x) * segmentPercent, 0, startNode.z + (endNode.z - startNode.z) * segmentPercent + ((index%2===0)?5:-5));
            if(npc.isMega > 0) { npc.isMega--; npc.mesh.scale.set(2.5,2.5,2.5); }
            else if(npc.isSquished > 0) { npc.mesh.scale.set(0.4,0.4,0.4); }
            else { npc.mesh.scale.set(1,1,1); }

            // リアルタイム順位計算
            let allRacers = [];
            allRacers.push({ id: "player", prog: totalProgress });
            npcs.forEach((n, idx) => { allRacers.push({ id: `npc_${idx}`, prog: (n.lap - 1) + n.progress }); });
            allRacers.sort((a, b) => b.prog - a.prog);

            playerRank = allRacers.findIndex(r => r.id === "player") + 1;
            rankText.innerText = `${playerRank}位 / 12`;

            // UI反映
            speedText.innerText = `SPEED: ${Math.round(speed * 60)} km/h`;

            // カメラ三人称視点追従
            let targetCamX = posX - Math.sin(angle) * 35;
            let targetCamZ = posZ - Math.cos(angle) * 35;
            camera.position.set(
                THREE.MathUtils.lerp(camera.position.x, targetCamX, 0.1),
                18,
                THREE.MathUtils.lerp(camera.position.z, targetCamZ, 0.1)
            );
            camera.lookAt(posX, 5, posZ);

            updateRoulette();
            drawMiniMap();
        }

        // --- 11. ミニマップ2D高速レンダリング ---
        const mapCanvas = document.getElementById("mini-map");
        const mapCtx = mapCanvas.getContext("2d");
        mapCanvas.width = 220; mapCanvas.height = 220;

        function drawMiniMap() {
            mapCtx.clearRect(0, 0, 220, 220);
            mapCtx.save();
            mapCtx.translate(110, 110);
            mapCtx.scale(0.2, 0.2); // マップスケール

            // 2Dコースライン
            mapCtx.beginPath();
            mapCtx.strokeStyle = "#555577"; mapCtx.lineWidth = 25; mapCtx.lineJoin = "round";
            for (let i = 0; i <= NODE_COUNT; i++) {
                let n = trackNodes[i % NODE_COUNT];
                if (i === 0) mapCtx.moveTo(n.x, n.z); else mapCtx.lineTo(n.x, n.z);
            }
            mapCtx.stroke();

            // ライバル位置（赤いドット）
            npcs.forEach(npc => {
                mapCtx.beginPath();
                mapCtx.arc(npc.mesh.position.x, npc.mesh.position.z, 10, 0, Math.PI*2);
                mapCtx.fillStyle = "#ff2222"; mapCtx.fill();
            });

            // プレイヤー位置（自分：青い丸）
            mapCtx.beginPath();
            mapCtx.arc(posX, posZ, 14, 0, Math.PI*2);
            mapCtx.fillStyle = "#3388ff"; mapCtx.fill();
            mapCtx.lineWidth = 3; mapCtx.strokeStyle = "#ffffff"; mapCtx.stroke();

            mapCtx.restore();
        }

        // --- 12. カウントダウンシーケンス＆メインループ起動 ---
        function startSequence() {
            let count = 3;
            soundCount();
            let timer = setInterval(() => {
                count--;
                if (count === 2) { countdownUI.innerText = "2"; soundCount(); }
                else if (count === 1) { countdownUI.innerText = "1"; soundCount(); }
                else if (count === 0) {
                    countdownUI.innerText = "GO!!"; soundGo();
                    gameActive = true;
                } else if (count === -1) {
                    countdownUI.style.display = "none";
                    clearInterval(timer);
                }
            }, 1000);
        }

        startSequence();

        function animate() {
            requestAnimationFrame(animate);
            updateGame();
            renderer.render(scene, camera);
        }
        animate();

        // 画面リサイズ対応
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
