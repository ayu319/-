<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>キノピオファクトリー：立体コース完全復元版</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #ui-container {
            position: absolute; top: 20px; left: 20px; color: white; font-weight: bold;
            background: rgba(0,0,0,0.6); padding: 15px; border-radius: 8px; pointer-events: none;
            z-index: 10;
        }
        #countdown {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-size: 60px; font-weight: bold; color: #fff; text-shadow: 4px 4px 0px #000;
            pointer-events: none; text-align: center; z-index: 10; width: 80%;
        }
        #turbo-ui {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            font-size: 28px; font-weight: bold; color: #fff; text-shadow: 2px 2px 4px #000;
            text-align: center; pointer-events: none; z-index: 10;
        }
        .item-box-ui {
            position: absolute; top: 20px; right: 20px; width: 80px; height: 80px;
            border: 4px solid #fff; background: rgba(0,0,0,0.5); border-radius: 10px;
            display: flex; align-items: center; justify-content: center; z-index: 10;
        }
        .item-img-ui { width: 64px; height: 64px; display: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="ui-container">
        <div>🏎️ SPEED: <span id="speed-val">0</span> km/h</div>
        <div>🪙 COINS: <span id="coin-val">0</span> / 10</div>
        <div>🏁 LAP: <span id="lap-val">1</span> / 3</div>
        <div id="item-ammo-ui" style="margin-top:5px; color:#ffd700; display:none;">🔋 残弾: <span id="item-ammo-val">0</span></div>
    </div>
    <div id="countdown">3</div>
    <div id="turbo-ui"><span id="turbo-text"></span></div>
    <div class="item-box-ui" id="player-item-box">
        <img id="player-item-img" class="item-img-ui" src="" alt="item">
    </div>

    <script>
        // --- ゲームの基本設定と初期化 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a24);
        scene.fog = new THREE.FogExp2(0x1a1a24, 0.0015);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // 環境光 & 太陽光
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(100, 150, 50);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 500;
        const d = 250;
        dirLight.shadow.camera.left = -d;
        dirLight.shadow.camera.right = d;
        dirLight.shadow.camera.top = d;
        dirLight.shadow.camera.bottom = -d;
        scene.add(dirLight);

        // 工場用赤色警告灯
        const alarmLight = new THREE.PointLight(0xff0000, 1.5, 100);
        alarmLight.position.set(0, 30, 0);
        scene.add(alarmLight);

        // --- コース設計 (3D立体チューブコースを完全復元) ---
        const NODE_COUNT = 36;
        const npcPathNodes = [
            new THREE.Vector3(0, 0, 0),
            new THREE.Vector3(0, 0, -40),
            new THREE.Vector3(0, 0, -80),
            new THREE.Vector3(0, 0, -120),
            new THREE.Vector3(10, 0, -150),
            new THREE.Vector3(30, 0, -170),
            new THREE.Vector3(60, 0, -180),
            new THREE.Vector3(100, 0, -180),
            new THREE.Vector3(140, 0, -180),
            new THREE.Vector3(180, 0, -180),
            new THREE.Vector3(210, 2, -160),
            new THREE.Vector3(220, 6, -130),
            new THREE.Vector3(220, 12, -90),
            new THREE.Vector3(220, 16, -50),
            new THREE.Vector3(220, 20, -10),
            new THREE.Vector3(210, 20, 20),
            new THREE.Vector3(180, 18, 40),
            new THREE.Vector3(140, 14, 40),
            new THREE.Vector3(100, 8, 40),
            new THREE.Vector3(60, 2, 40),
            new THREE.Vector3(20, 0, 40),
            new THREE.Vector3(-20, 0, 40),
            new THREE.Vector3(-50, 0, 50),
            new THREE.Vector3(-70, 0, 70),
            new THREE.Vector3(-80, 0, 100),
            new THREE.Vector3(-80, 0, 140),
            new THREE.Vector3(-80, 0, 180),
            new THREE.Vector3(-70, 0, 210),
            new THREE.Vector3(-50, 0, 230),
            new THREE.Vector3(-20, 0, 240),
            new THREE.Vector3(20, 0, 240),
            new THREE.Vector3(60, 0, 230),
            new THREE.Vector3(80, 0, 200),
            new THREE.Vector3(80, 0, 150),
            new THREE.Vector3(50, 0, 100),
            new THREE.Vector3(20, 0, 40)
        ];

        const roadWidth = 26;
        const wallHeight = 4;
        const pts = [];
        for (let i = 0; i < NODE_COUNT; i++) {
            pts.push(npcPathNodes[i]);
        }
        const curve = new THREE.CatmullRomCurve3(pts);
        curve.closed = true;

        // 元の index (2).html で使われていた、チューブ型の高低差立体コースを生成
        const trackGeometry = new THREE.TubeGeometry(curve, 120, roadWidth / 2, 8, true);
        const trackMaterial = new THREE.MeshStandardMaterial({
            color: 0x22222a,
            roughness: 0.8,
            metalness: 0.2,
            side: THREE.DoubleSide
        });
        const trackMesh = new THREE.Mesh(trackGeometry, trackMaterial);
        trackMesh.receiveShadow = true;
        scene.add(trackMesh);

        // --- コース壁・ガードレール ---
        const wallMaterial = new THREE.MeshStandardMaterial({ color: 0x3a3a44, metalness: 0.5, roughness: 0.5 });

        for (let i = 0; i < NODE_COUNT; i++) {
            let idx = i;
            let nextIdx = (i + 1) % NODE_COUNT;
            let curr = npcPathNodes[idx];
            let next = npcPathNodes[nextIdx];

            let forward = new THREE.Vector3().subVectors(next, curr);
            let len = forward.length();
            forward.normalize();
            let right = new THREE.Vector3().crossVectors(forward, new THREE.Vector3(0, 1, 0)).normalize().multiplyScalar(roadWidth / 2);

            let wallGeo = new THREE.BoxGeometry(1, 4, len);

            // 左壁
            let wl = new THREE.Mesh(wallGeo, wallMaterial);
            let posL = curr.clone().add(forward.clone().multiplyScalar(len / 2)).sub(right).add(new THREE.Vector3(0, 2, 0));
            wl.position.copy(posL);
            wl.lookAt(next.clone().sub(right).add(new THREE.Vector3(0, 2, 0)));
            wl.castShadow = true;
            wl.receiveShadow = true;
            scene.add(wl);

            // 右壁
            let wr = new THREE.Mesh(wallGeo, wallMaterial);
            let posR = curr.clone().add(forward.clone().multiplyScalar(len / 2)).add(right).add(new THREE.Vector3(0, 2, 0));
            wr.position.copy(posR);
            wr.lookAt(next.clone().add(right).add(new THREE.Vector3(0, 2, 0)));
            wr.castShadow = true;
            wr.receiveShadow = true;
            scene.add(wr);
        }

        // 工場の装飾：動く大歯車
        const gears = [];
        const gearGeo = new THREE.CylinderGeometry(20, 20, 4, 16);
        const gearMat = new THREE.MeshStandardMaterial({ color: 0x666677, metalness: 0.8, roughness: 0.2 });
        for (let i = 0; i < 3; i++) {
            const gear = new THREE.Mesh(gearGeo, gearMat);
            gear.position.set(-80 + i * 80, -5, -80);
            gear.rotation.x = Math.PI / 2;
            scene.add(gear);
            gears.push(gear);
        }

        // --- コイン、アイテムボックス、障害物の配置 ---
        const coins = [];
        const coinGeo = new THREE.CylinderGeometry(1.5, 1.5, 0.4, 16);
        const coinMat = new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.9, roughness: 0.1 });
        coinGeo.rotateX(Math.PI / 2);

        const itemBoxes = [];
        const itemBoxGeo = new THREE.BoxGeometry(3, 3, 3);
        const itemBoxMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, transparent: true, opacity: 0.7, wireframe: false });

        const mudPools = [];
        const mudGeo = new THREE.PlaneGeometry(16, 20);
        const mudMat = new THREE.MeshBasicMaterial({ color: 0x4a2a0a, side: THREE.DoubleSide });
        mudGeo.rotateX(-Math.PI / 2);

        const crushers = [];
        const crusherGeo = new THREE.BoxGeometry(10, 15, 10);
        const crusherMat = new THREE.MeshStandardMaterial({ color: 0x22222a, metalness: 0.9, roughness: 0.1 });

        for (let i = 0; i < NODE_COUNT; i++) {
            let curr = npcPathNodes[i];
            let next = npcPathNodes[(i + 1) % NODE_COUNT];
            let mid = new THREE.Vector3().addVectors(curr, next).multiplyScalar(0.5);

            if (i % 3 === 1) {
                const coin = new THREE.Mesh(coinGeo, coinMat);
                coin.position.copy(mid).add(new THREE.Vector3(0, 1.5, 0));
                scene.add(coin);
                coins.push(coin);
            }
            if (i % 5 === 2) {
                const box = new THREE.Mesh(itemBoxGeo, itemBoxMat);
                box.position.copy(mid).add(new THREE.Vector3(0, 2, 0));
                scene.add(box);
                itemBoxes.push({ mesh: box, respawnTimer: 0 });
            }
            if (i === 15 || i === 18) {
                const mud = new THREE.Mesh(mudGeo, mudMat);
                mud.position.copy(mid).add(new THREE.Vector3(0, 0.05, 0));
                scene.add(mud);
                mudPools.push(mud);
            }
            if (i === 12 || i === 22) {
                const crusher = new THREE.Mesh(crusherGeo, crusherMat);
                crusher.position.copy(mid).add(new THREE.Vector3(0, 15, 0));
                scene.add(crusher);
                crushers.push({ mesh: crusher, cycle: Math.random() * Math.PI, state: 'up' });
            }
        }

        // --- プレイヤーとNPCの設定 ---
        const kartGeo = new THREE.BoxGeometry(3, 1.5, 5);
        const playerMat = new THREE.MeshStandardMaterial({ color: 0xff3333, metalness: 0.5, roughness: 0.5 });
        const player = new THREE.Mesh(kartGeo, playerMat);
        player.position.set(0, 0.75, 0);
        player.castShadow = true;
        scene.add(player);

        let speed = 0;
        let maxSpeed = 1.6;
        const accel = 0.02;
        const drag = 0.985;
        let angle = Math.PI;

        const keys = {};
        window.addEventListener('keydown', e => { keys[e.code] = true; });
        window.addEventListener('keyup', e => { keys[e.code] = false; });

        let coinCount = 0;
        let playerLap = 1;
        let currentProgressNode = 0;
        let currentItem = null;
        let itemAmmo = 0;
        let isSquishedTimer = 0;
        let itemMushroomTimer = 0;
        let itemGoldenTimer = 0;
        let itemBooTimer = 0;
        let playerHitInvincibleTimer = 0;
        let countdownVal = 3;
        let gameActive = false;

        const speedVal = document.getElementById('speed-val');
        const coinVal = document.getElementById('coin-val');
        const lapVal = document.getElementById('lap-val');
        const countdown = document.getElementById('countdown');
        const turboText = document.getElementById('turbo-text');
        const playerItemImg = document.getElementById('player-item-img');
        const itemAmmoUi = document.getElementById('item-ammo-ui');
        const itemAmmoVal = document.getElementById('item-ammo-val');

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, duration, type="sine") {
            try {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch(e){}
        }
        function soundCoin() { playTone(880, 0.1); setTimeout(()=>playTone(1320, 0.2), 80); }
        function soundItem() { playTone(440, 0.05); setTimeout(()=>playTone(660, 0.05), 50); setTimeout(()=>playTone(880, 0.1), 100); }
        function soundUseItem() { playTone(587.33, 0.15, "square"); }
        function soundHit() { playTone(150, 0.4, "sawtooth"); }

        const npcColors = [0x3333ff, 0x33ff33, 0xffff33];
        const npcs = npcColors.map((color, index) => {
            const mat = new THREE.MeshStandardMaterial({ color: color, metalness: 0.5, roughness: 0.5 });
            const mesh = new THREE.Mesh(kartGeo, mat);
            mesh.castShadow = true;
            scene.add(mesh);
            return {
                mesh: mesh,
                progress: 0.005 + index * 0.002,
                speed: 0.9 + Math.random() * 0.2,
                lap: 1,
                isMega: 0,
                heldItem: null,
                itemUseTimer: 0
            };
        });

        const ballGeo = new THREE.SphereGeometry(4, 16, 16);
        const ballMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.9, roughness: 0.1 });
        const ironBall = new THREE.Mesh(ballGeo, ballMat);
        ironBall.castShadow = true;
        scene.add(ironBall);
        let ballProgress = 0.5;

        const ITEM_TYPES = [
            { name: "ダッシュキノコ", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/active-items/mach-bike.png", color: 0xff0000 },
            { name: "トリプルキノコ", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/active-items/mach-bike.png", color: 0xff3333 },
            { name: "金ピカキノコ", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/active-items/mach-bike.png", color: 0xffd700 },
            { name: "テレサ", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/active-items/mach-bike.png", color: 0xaaaaaa },
            { name: "サンダー", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/active-items/mach-bike.png", color: 0xffff00 },
            { name: "メガキノコ", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/active-items/mach-bike.png", color: 0xff8800 }
        ];

        const cdInterval = setInterval(() => {
            countdownVal--;
            if (countdownVal > 0) {
                countdown.innerText = countdownVal;
                playTone(440, 0.1);
            } else if (countdownVal === 0) {
                countdown.innerText = "GO!";
                playTone(880, 0.3);
                gameActive = true;
            } else {
                countdown.style.display = 'none';
                clearInterval(cdInterval);
            }
        }, 1000);

        const clock = new THREE.Clock();

        function dropCoins() {
            let countToDrop = Math.min(coinCount, 3);
            coinCount -= countToDrop;
            coinVal.innerText = coinCount;
            for(let i=0; i<countToDrop; i++) {
                const dCoin = new THREE.Mesh(coinGeo, coinMat);
                dCoin.position.copy(player.position).add(new THREE.Vector3((Math.random()-0.5)*15, 1, (Math.random()-0.5)*15));
                scene.add(dCoin);
                coins.push(dCoin);
                setTimeout(() => {
                    scene.remove(dCoin);
                    const idx = coins.indexOf(dCoin);
                    if(idx > -1) coins.splice(idx, 1);
                }, 10000);
            }
        }

        function triggerThunder() {
            playTone(1000, 0.5, "triangle");
            scene.background = new THREE.Color(0xffffff);
            setTimeout(() => { scene.background = new THREE.Color(0x1a1a24); }, 150);
            npcs.forEach(npc => {
                if(npc.isMega <= 0) {
                    npc.speed *= 0.5;
                    npc.mesh.scale.set(0.5, 0.25, 0.5);
                    setTimeout(() => {
                        npc.speed = 0.9 + Math.random()*0.2;
                        npc.mesh.scale.set(1, 1, 1);
                    }, 5000);
                }
            });
        }

        function activateMega() {
            playTone(330, 0.2);
            player.scale.set(3, 3, 3);
            maxSpeed = 2.4;
            setTimeout(() => {
                player.scale.set(1, 1, 1);
                maxSpeed = 1.6;
            }, 6000);
        }

        function useItem() {
            if (!currentItem) return;
            soundUseItem();
            if (currentItem.name === "ダッシュキノコ") {
                itemMushroomTimer = 90;
                currentItem = null;
            } else if (currentItem.name === "トリプルキノコ") {
                itemMushroomTimer = 90;
                itemAmmo--;
                itemAmmoVal.innerText = itemAmmo;
                if(itemAmmo <= 0) { currentItem = null; itemAmmoUi.style.display = "none"; }
            } else if (currentItem.name === "金ピカキノコ") {
                itemMushroomTimer = 90;
                itemGoldenTimer--;
                if(itemGoldenTimer <= 0) { currentItem = null; }
            } else if (currentItem.name === "テレサ") {
                itemBooTimer = 240;
                currentItem = null;
                coins.forEach(c => {
                    let d = player.position.distanceTo(c.position);
                    if(d < 60) {
                        scene.remove(c);
                        const idx = coins.indexOf(c);
                        if(idx > -1) coins.splice(idx, 1);
                        coinCount = Math.min(coinCount + 1, 10);
                        coinVal.innerText = coinCount;
                        soundCoin();
                    }
                });
            } else if (currentItem.name === "サンダー") {
                triggerThunder();
                currentItem = null;
            } else if (currentItem.name === "メガキノコ") {
                activateMega();
                currentItem = null;
            }

            if(!currentItem) {
                playerItemImg.style.display = "none";
            }
        }

        function update() {
            requestAnimationFrame(update);
            const delta = clock.getDelta();

            alarmLight.intensity = 1.5 + Math.sin(Date.now() * 0.005) * 1.0;
            gears.forEach((g, idx) => { g.rotation.z += (idx % 2 === 0 ? 0.02 : -0.02); });

            if (!gameActive) {
                renderer.render(scene, camera);
                return;
            }

            if (isSquishedTimer > 0) { isSquishedTimer--; player.scale.set(1.5, 0.1, 1.5); }
            else { player.scale.set(1, 1, 1); }
            if (playerHitInvincibleTimer > 0) playerHitInvincibleTimer--;
            if (itemMushroomTimer > 0) itemMushroomTimer--;
            if (itemBooTimer > 0) itemBooTimer--;

            if (isSquishedTimer <= 0) {
                if (keys['ArrowUp'] || keys['KeyW']) {
                    let effMax = maxSpeed * (1 + coinCount * 0.03);
                    if (itemMushroomTimer > 0) effMax *= 1.6;
                    if (speed < effMax) speed += accel;
                } else if (keys['ArrowDown'] || keys['KeyS']) {
                    if (speed > -maxSpeed * 0.5) speed -= accel;
                } else {
                    speed *= drag;
                    if (Math.abs(speed) < 0.01) speed = 0;
                }

                if (keys['ArrowLeft'] || keys['KeyA']) { angle += 0.04; }
                if (keys['ArrowRight'] || keys['KeyD']) { angle -= 0.04; }
            } else {
                speed *= drag;
            }

            let inMud = false;
            mudPools.forEach(mud => {
                if (player.position.distanceTo(mud.position) < 12) { inMud = true; }
            });
            if (inMud && itemMushroomTimer <= 0) { speed *= 0.85; }

            if (keys['Space']) { keys['Space'] = false; useItem(); }

            player.position.x += Math.sin(angle) * speed;
            player.position.z += Math.cos(angle) * speed;
            player.rotation.y = angle;

            speedVal.innerText = Math.round(Math.abs(speed) * 80);

            ballProgress += 0.003;
            let ballSegment = Math.floor(ballProgress * NODE_COUNT);
            let ballPercent = (ballProgress * NODE_COUNT) % 1;
            let bStart = npcPathNodes[ballSegment % NODE_COUNT];
            let bEnd = npcPathNodes[(ballSegment + 1) % NODE_COUNT];
            ironBall.position.set(bStart.x + (bEnd.x - bStart.x)*ballPercent, 4, bStart.z + (bEnd.z - bStart.z)*ballPercent);

            if (player.position.distanceTo(ironBall.position) < 5.5 && playerHitInvincibleTimer <= 0 && itemMushroomTimer <= 0) {
                isSquishedTimer = 90; speed = 0;
                playerHitInvincibleTimer = 180;
                soundHit(); dropCoins();
            }

            crushers.forEach(crusher => {
                crusher.cycle += delta * 4;
                let y = 15 + Math.sin(crusher.cycle) * 11;
                crusher.mesh.position.y = y;

                if (y < 2.0 && player.position.distanceTo(crusher.mesh.position) < 6.5 && isSquishedTimer <= 0) {
                    isSquishedTimer = 100; speed = 0;
                    soundHit(); dropCoins();
                }
            });

            coins.forEach(coin => {
                coin.rotation.y += 0.05;
                if (player.position.distanceTo(coin.position) < 3.5) {
                    scene.remove(coin);
                    const idx = coins.indexOf(coin);
                    if (idx > -1) coins.splice(idx, 1);
                    coinCount = Math.min(coinCount + 1, 10);
                    coinVal.innerText = coinCount;
                    soundCoin();
                }
            });

            itemBoxes.forEach(box => {
                if (box.respawnTimer > 0) {
                    box.respawnTimer--;
                    if (box.respawnTimer === 0) { scene.add(box.mesh); }
                } else {
                    box.mesh.rotation.x += 0.02;
                    box.mesh.rotation.y += 0.02;
                    if (player.position.distanceTo(box.mesh.position) < 3.5) {
                        scene.remove(box.mesh);
                        box.respawnTimer = 300;
                        soundItem();
                        if (!currentItem) {
                            currentItem = ITEM_TYPES[Math.floor(Math.random() * ITEM_TYPES.length)];
                            playerItemImg.src = currentItem.img;
                            playerItemImg.style.display = "block";
                            playerItemImg.style.border = `4px solid ${currentItem.color}`;
                            if(currentItem.name === "トリプルキノコ") {
                                itemAmmo = 3; itemAmmoVal.innerText = itemAmmo; itemAmmoUi.style.display = "block";
                            } else if(currentItem.name === "金ピカキノコ") {
                                itemGoldenTimer = 300;
                            }
                        }
                    }
                }
            });

            let nextNodeIdx = (currentProgressNode + 1) % NODE_COUNT;
            if (player.position.distanceTo(npcPathNodes[nextNodeIdx]) < 25) {
                currentProgressNode = nextNodeIdx;
                if (currentProgressNode === 0) {
                    playerLap++;
                    lapVal.innerText = playerLap;
                    if (playerLap > 3) {
                        gameActive = false;
                        showFinalResults();
                    }
                }
            }

            npcs.forEach((npc, index) => {
                let nSpeed = (0.001 * npc.speed);
                npc.progress += nSpeed;
                if (npc.progress >= 1) { npc.progress -= 1; npc.lap++; }

                let p = Math.max(0, npc.progress);
                let segment = Math.floor(p * NODE_COUNT);
                let segmentPercent = (p * NODE_COUNT) % 1;
                let startNode = npcPathNodes[segment % NODE_COUNT];
                let endNode = npcPathNodes[(segment + 1) % NODE_COUNT];
                npc.mesh.position.set(
                    startNode.x + (endNode.x - startNode.x) * segmentPercent,
                    0.75,
                    startNode.z + (endNode.z - startNode.z) * segmentPercent + ((index % 2 === 0) ? 5 : -5)
                );
            });

            let targetCamPos = new THREE.Vector3(
                player.position.x - Math.sin(angle) * 25,
                player.position.y + 11,
                player.position.z - Math.cos(angle) * 25
            );
            camera.position.lerp(targetCamPos, 0.1);
            camera.lookAt(player.position.clone().add(new THREE.Vector3(0, 2, 0)));

            renderer.render(scene, camera);
        }

        function showFinalResults() {
            let totalTime = (performance.now() / 1000).toFixed(2);
            let resultHtml = `
                <div style="color: #fff; font-size: 32px; text-shadow: 2px 2px 5px #000; text-align: center;">
                    🏁 FINISH! 🏁<br>
                    Total Time: ${totalTime}s<br>
                    <span style="font-size: 16px; color: #888;">Ctrl + Rキー（またはリロード）でもう一度遊べます</span>
                </div>
            `;
            let div = document.createElement('div');
            div.style.position = 'absolute';
            div.style.top = '50%';
            div.style.left = '50%';
            div.style.transform = 'translate(-50%, -50%)';
            div.style.background = 'rgba(0,0,0,0.85)';
            div.style.padding = '30px';
            div.style.borderRadius = '15px';
            div.style.boxShadow = '0 0 20px #00ffff';
            div.style.zIndex = '100';
            div.innerHTML = resultHtml;
            document.body.appendChild(div);
        }

        update();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }, false);
    </script>
</body>
</html>
