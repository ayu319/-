let audioCtx = null;
let bgmInterval = null;

function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

window.addEventListener('click', () => { initAudio(); });
window.addEventListener('keydown', () => { initAudio(); });

function playTone(freq, duration, type='sine', volume=0.1) {
    if (!audioCtx) return;
    try {
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(volume, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    } catch(e) {}
}

function soundCount() { playTone(440, 0.1, 'sine', 0.15); }
function soundGo() { playTone(880, 0.4, 'sine', 0.2); startBGM(); }

];
const NODE_COUNT = npcPathNodes.length;

let totalTrackLength = 0;
let segmentLengths = [];

function initTrackLengths() {
    totalTrackLength = 0;
    segmentLengths = [];
    for (let i = 0; i < NODE_COUNT; i++) {
        let p1 = npcPathNodes[i];
        let p2 = npcPathNodes[(i + 1) % NODE_COUNT];
        let dx = p2.x - p1.x;
        let dz = p2.z - p1.z;
        let len = Math.sqrt(dx*dx + dz*dz);
        segmentLengths.push(len);
        totalTrackLength += len;
    }
}
initTrackLengths();

// プレイヤーのコース上の正確な進捗率(0.0〜1.0)を算出する計算エンジン
function calculatePlayerProgress() {
    let bestDist = Infinity;
    let bestProgress = 0;
    let accumulatedLength = 0;
    const px = carGroup.position.x;
    const pz = carGroup.position.z;
    
    for (let i = 0; i < NODE_COUNT; i++) {
        let p1 = npcPathNodes[i];
        let p2 = npcPathNodes[(i + 1) % NODE_COUNT];
        let len = segmentLengths[i];
        
        let t = 0;
        if (len > 0) {
            t = ((px - p1.x) * (p2.x - p1.x) + (pz - p1.z) * (p2.z - p1.z)) / (len * len);
            t = Math.max(0, Math.min(1, t)); // 線分上にクランプ
        }
        let projX = p1.x + t * (p2.x - p1.x);
        let projZ = p1.z + t * (p2.z - p1.z);
        let dist = Math.sqrt((px - projX)**2 + (pz - projZ)**2);
        
        if (dist < bestDist) {
            bestDist = dist;
            bestProgress = (accumulatedLength + t * len) / totalTrackLength;
        }
        accumulatedLength += len;
    }
    return bestProgress;
}

// 👑 常時、正確な順位（1〜12位）を算出する関数
function getPlayerRank() {
    if (raceState !== 2) return 1;
    let myRank = 1;
    playerProgress = (itemBulletTimer > 0) ? bulletProgress : calculatePlayerProgress();
    let playerProgressVal = playerLap + playerProgress;
    
    npcs.forEach(npc => {
        let npcProgressVal = npc.lap + npc.progress;
        if (npcProgressVal > playerProgressVal) {
            myRank++;
        }
    });
    return myRank;
}

        pool = ["キノコ", "赤甲羅", "赤甲羅", "デカキノコ", "金キノコ", "スター", "テレサ"];

        pool = ["金キノコ", "スター", "スター", "サンダー", "キラー", "キラー", "キラー", "テレサ"];
    }
    return pool[Math.floor(Math.random() * pool.length)];
}

// 絵文字のスプライトを作成する共通関数
function createEmojiSprite(emoji) {
    const canvas = document.createElement('canvas');
    canvas.width = 128; canvas.height = 128;
    const ctx = canvas.getContext('2d');
    ctx.font = '90px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(emoji, 64, 64);
    const texture = new THREE.CanvasTexture(canvas);
    const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
    const sprite = new THREE.Sprite(material); sprite.scale.set(7, 7, 1);
    return sprite;
}

// --- 🏎️ NPCライバル AI高度自動走行ロジック ---
function updateNpcs() {
    npcs.forEach((npc, index) => {
        if (raceState === 1) return;
        if (npc.isSquished > 0) { npc.isSquished--; npc.mesh.scale.set(1.5, 0.1, 1.5); return; }
        
        // 通常補正サイズ
        if (npc.isMega > 0) { npc.isMega--; npc.mesh.scale.set(2.2, 2.2, 2.2); }
        else { npc.mesh.scale.set(1.0, 1.0, 1.0); }
        
        if (npc.isStar > 0) npc.isStar--;

        let nSpeed = 0.0016 + Math.sin(index + Date.now()*0.001)*0.0002;
        if (npc.boostTimer > 0) { npc.boostTimer--; nSpeed *= 1.7; }
        if (npc.isMega > 0) nSpeed *= 1.35;
        if (npc.isStar > 0) nSpeed *= 1.45;
        
        // プレイヤーがキラー中のNPC被弾判定
        if (itemBulletTimer > 0 && carGroup.position.distanceTo(npc.mesh.position) < 14.0 && npc.isStar <= 0) {
            npc.isSquished = 60; dropNpcItems(npc);
        }
        
        // プレイヤーのスター体当たり判定
        if (itemStarTimer > 0 && carGroup.position.distanceTo(npc.mesh.position) < 8.0 && npc.isStar <= 0 && npc.isSquished <= 0) {
            npc.isSquished = 60; dropNpcItems(npc);
        }

        // NPCアイテム自動取得・使用AI
        if (raceState === 2 && !npc.heldItem && Math.random() < 0.0018) {
            let r = index % 10 + 1; npc.heldItem = getRandomItemByRank(r); npc.itemUseTimer = 100 + Math.random()*200;
        }

        npc.progress += nSpeed;
        if (npc.progress >= 1.0) { npc.progress -= 1.0; npc.lap++; }
        if (npc.heldItem) { npc.itemUseTimer--; if (npc.itemUseTimer <= 0) { useNpcItem(npc); } }

        let p = Math.max(0, npc.progress);
        let segment = Math.floor(p * NODE_COUNT);
        let segmentPercent = (p * NODE_COUNT) % 1;
        let startNode = npcPathNodes[segment % NODE_COUNT];
        let endNode = npcPathNodes[(segment + 1) % NODE_COUNT];
        
        // 左右にきれいに分散させる
        let offsetAmount = ((index % 3) - 1) * 12;
        let rawX = startNode.x + (endNode.x - startNode.x) * segmentPercent;
        let rawZ = startNode.z + (endNode.z - startNode.z) * segmentPercent;
        
        let dx = endNode.x - startNode.x;
        let dz = endNode.z - startNode.z;
        let len = Math.sqrt(dx*dx + dz*dz);
        let nx = -dz / len; let nz = dx / len; 
        
        npc.mesh.position.set(rawX + nx * offsetAmount, 0.4, rawZ + nz * offsetAmount);
        npc.mesh.lookAt(endNode.x + nx * offsetAmount, 0.4, endNode.z + nz * offsetAmount);
    });
}

function loop() {
    requestAnimationFrame(loop);
    
    // ギミックアニメーション
    gearGroup.rotation.z += 0.015;
    alertLight.intensity = 1.5 + Math.sin(Date.now() * 0.006) * 1.0;

    if (raceState === 0) {
        renderer.render(scene, camera);
        return;
    }

    // カウントダウン処理
    if (raceState === 1) {
        countdownTime -= 0.016;
        let secondsInt = Math.ceil(countdownTime);
        if (secondsInt > 0) {
            document.getElementById("countdown").innerText = secondsInt;
            if (secondsInt !== lastSecondsInt) { soundCount(); lastSecondsInt = secondsInt; }
        } else {
            document.getElementById("countdown").innerText = "GO!";
            if (lastSecondsInt !== 0) { soundGo(); lastSecondsInt = 0; raceState = 2; }
        }
        
        if (keys.w) { rocketTimer++; }
        if (countdownTime < 0.6 && rocketTimer > 40) { rocketFailed = true; }
        
        if (countdownTime <= -1.0) {
            document.getElementById("countdown").innerText = "";
            if (rocketTimer > 15 && !rocketFailed) { turboTimer = 75; speed = 3.8; soundBoost(); document.getElementById("turbo-ui").innerText = "🔥 ロケットスタート成功！！！ 🔥"; document.getElementById("turbo-ui").style.color = "#ffcc00"; }
            else if (rocketFailed) { isSquishedTimer = 90; speed = 0; document.getElementById("turbo-ui").innerText = "💥 オーバーヒート！！！ 💥"; document.getElementById("turbo-ui").style.color = "#ff3333"; }
        }
    }

    // アイテムボックスの復活タイマー
    itemBoxes.forEach(box => {
        if (box.respawnTimer > 0) {
            box.respawnTimer--;
            if (box.respawnTimer === 0) { box.mesh.visible = true; }
        } else {
            box.mesh.rotation.y += 0.03; box.mesh.rotation.x += 0.01;
        }
    });

    // アイテムボックス接触
    if (raceState === 2 && !isItemRoulette && (!heldItems[0] || !heldItems[1])) {
        itemBoxes.forEach(box => {
            if (box.mesh.visible && carGroup.position.distanceTo(box.mesh.position) < 8.0) {
                box.mesh.visible = false; box.respawnTimer = 280; soundItem();
                isItemRoulette = true; rouletteTimer = 40; rouletteSlot = heldItems[0] ? 1 : 0;
            }
        });
    }

    // ルーレットアニメーション
    if (isItemRoulette) {
        rouletteTimer--;
        let randomTicker = itemTypes[Math.floor(Math.random() * itemTypes.length)];
        if (rouletteSlot === 0) { document.getElementById("item-slot-1").innerHTML = `ITEM 1<br>🎲 ${randomTicker}`; }
        else { document.getElementById("item-slot-2").innerHTML = `ITEM 2<br>🎲 ${randomTicker}`; }
        
        if (rouletteTimer <= 0) {
            isItemRoulette = false;
            let currentRank = getPlayerRank();
            let finalItem = getRandomItemByRank(currentRank);
            if (rouletteSlot === 0) heldItems[0] = finalItem; else heldItems[1] = finalItem;
            updateItemUI();
        }
    }

    // バフタイマー減算
    if (itemMushroomTimer > 0) itemMushroomTimer--;
    if (itemMegaTimer > 0) { itemMegaTimer--; if (itemMegaTimer <= 0) carGroup.scale.set(1, 1, 1); }
    if (itemStarTimer > 0) itemStarTimer--;
    if (itemBooTimer > 0) itemBooTimer--;
    if (itemBulletTimer > 0) itemBulletTimer--;
    if (playerHitInvincibleTimer > 0) playerHitInvincibleTimer--;
    if (jumpActionTimer > 0) jumpActionTimer--;
    if (poleSpinTimer > 0) poleSpinTimer--;

    if (itemGoldenTimer > 0) {
        itemGoldenTimer--;
        if (itemGoldenTimer <= 0 && heldItems[0] === "金キノコ") { heldItems[0] = heldItems[1]; heldItems[1] = null; updateItemUI(); }
    }

    // 💥 障害物接触判定群（大歯車＆ポール）
    // 1. 大歯車ギミック
    if (carGroup.position.distanceTo(gearGroup.position) < 32.0) {
        hitPlayerObstacle("💥 工場の大歯車に巻き込まれた！！！ 💥");
    }
    // 2. ダートポール（中央配置2本）への衝突判定
    const distToPole1 = Math.sqrt(Math.pow(carGroup.position.x - pole1Group.position.x, 2) + Math.pow(carGroup.position.z - pole1Group.position.z, 2));
    const distToPole2 = Math.sqrt(Math.pow(carGroup.position.x - pole2Group.position.x, 2) + Math.pow(carGroup.position.z - pole2Group.position.z, 2));
    if ((distToPole1 < 8.0 || distToPole2 < 8.0) && poleSpinTimer <= 0) {
        hitPlayerObstacle("💥 工場の鉄柱ポールに激突した！！！ 💥");
    }

    // 甲羅の物理更新
    for (let i = shells.length - 1; i >= 0; i--) {
        let s = shells[i]; s.timer--;
        if (s.timer <= 0) { scene.remove(s.mesh); shells.splice(i, 1); continue; }
        
        if (s.type === "赤甲羅") {
            if (s.targetNpc === "player") {
                let diff = new THREE.Vector3().subVectors(carGroup.position, s.mesh.position);
                s.dir.lerp(diff.normalize(), 0.08).normalize();
            } else if (s.targetNpc) {
                let diff = new THREE.Vector3().subVectors(s.targetNpc.mesh.position, s.mesh.position);
                s.dir.lerp(diff.normalize(), 0.08).normalize();
            }
        }
        s.mesh.position.add(s.dir.clone().multiplyScalar(2.6));
        s.mesh.rotation.y += 0.2;

        // プレイヤーへの衝突
        if (s.mesh.position.distanceTo(carGroup.position) < 6.0) {
            scene.remove(s.mesh); shells.splice(i, 1);
            if (isItemShielding && shieldShellMesh) {
                carGroup.remove(shieldShellMesh); shieldShellMesh = null; isItemShielding = false;
                heldItems[0] = heldItems[1]; heldItems[1] = null; updateItemUI();
            } else {
                hitPlayerObstacle(s.type === "緑甲羅" ? "🟢 甲羅が直撃した！！！ 🟢" : "🔴 追尾甲羅に狙い撃ちされた！！！ 🔴");
            }
            continue;
        }
        // NPCへの衝突
        let hitNpc = false;
        for (let n = 0; n < npcs.length; n++) {
            let npc = npcs[n];
            if (s.mesh.position.distanceTo(npc.mesh.position) < 6.0 && npc.isStar <= 0) {
                scene.remove(s.mesh); shells.splice(i, 1); hitNpc = true;
                npc.isSquished = 60; dropNpcItems(npc); break;
            }
        }
        if (hitNpc) continue;
    }

    // 散らばったアイテム・コインの回収判定
    for (let i = droppedItems.length - 1; i >= 0; i--) {
        let d = droppedItems[i]; d.timer--;
        d.mesh.rotation.y += 0.04;
        if (d.timer <= 0) { scene.remove(d.mesh); droppedItems.splice(i, 1); continue; }
        
        if (carGroup.position.distanceTo(d.mesh.position) < 5.5) {
            scene.remove(d.mesh); droppedItems.splice(i, 1);
            if (d.type === "コイン") {
                coins = Math.min(coins + 1, 10);
                document.getElementById("coin-text").innerText = `🪙 コイン: ${coins}/10`;
                playTone(880, 0.1, 'sine', 0.1);
            } else {
                if (playerHitInvincibleTimer <= 0 && itemStarTimer <= 0 && itemBulletTimer <= 0 && itemMegaTimer <= 0) {
                    isSquishedTimer = 55; speed = 0; dropCoins(); dropPlayerItems();
                    document.getElementById("turbo-ui").innerText = `💥 スピンしたアイテム(${d.type})に激突！ 💥`;
                    document.getElementById("turbo-ui").style.color = "#ff3333";
                }
            }
            continue;
        }
    }

    // コース上固定配置コインの回収
    coinsArray.forEach(c => {
        if (!c.collected) {
            c.mesh.rotation.y += 0.04;
            if (carGroup.position.distanceTo(c.mesh.position) < 6.0) {
                c.collected = true; c.mesh.visible = false;
                coins = Math.min(coins + 1, 10);
                document.getElementById("coin-text").innerText = `🪙 コイン: ${coins}/10`;
                playTone(880, 0.1, 'sine', 0.1);
            }
        }
    });

    // NPCの位置更新
    updateNpcs();

    // 順位・LapUIの更新
    let pRank = getPlayerRank();
    document.getElementById("rank-text").innerText = `順位: ${pRank} / 12位`;
    document.getElementById("lap-text").innerText = isFinished ? "🏁 FINISH!" : `Lap: ${playerLap} / 3`;

    // 🚀 キラー自動高速巡航システム
    if (itemBulletTimer > 0) {
        bulletProgress += 0.0055;
        if (bulletProgress >= 1.0) { bulletProgress -= 1.0; playerLap++; }
        
        let seg = Math.floor(bulletProgress * NODE_COUNT);
        let segPct = (bulletProgress * NODE_COUNT) % 1;
        let startN = npcPathNodes[seg % NODE_COUNT];
        let endN = npcPathNodes[(seg + 1) % NODE_COUNT];
        
        carGroup.position.set(startN.x, 1.5, startN.z + (endN.z - startN.z)*segPct);
        carGroup.lookAt(endN.x, 1.5, endN.z);
        speed = 3.6; angle = carGroup.rotation.y;
        
        document.getElementById("turbo-ui").innerText = "🚀🚀 キラー自動巡航中！！！無敵！！！ 🚀🚀";
        document.getElementById("turbo-ui").style.color = "#ff3333";
    } 
    // 🏎️ プレイヤーの通常操作物理演算
    else {
        if (isSquishedTimer > 0) {
            isSquishedTimer--; speed = 0; carGroup.scale.set(1.5, 0.08, 1.5);
        } else {
            // スケール復帰
            if (itemMegaTimer > 0) carGroup.scale.set(2.0, 2.0, 2.0);
            else carGroup.scale.set(1.0, 1.0, 1.0);

            // 加速＆最高速度（コイン＆キノコ補正）
            let maxSp = baseMaxSpeed + (coins * 0.05);
            if (itemMushroomTimer > 0) maxSp *= 1.55;
            if (itemMegaTimer > 0) maxSp *= 1.25;
            if (itemStarTimer > 0) maxSp *= 1.35;

            // 地面減速エリア（泥・水プール等）
            let inMud = false;
            if (carGroup.position.z < -340 && carGroup.position.z > -460) {
                if (carGroup.position.x > -50 && carGroup.position.x < 300) { inMud = true; }
            }
            if (inMud && itemMushroomTimer <= 0 && itemStarTimer <= 0 && itemBulletTimer <= 0) { maxSp *= 0.4; }

            if (keys.w) { if (speed < maxSp) speed += 0.04; else speed *= 0.97; } 
            else if (keys.s) { if (speed > -1.0) speed -= 0.04; } 
            else { speed *= 0.93; }

            // ハンドル操作
            let turnSpeed = 0.032;
            if (isDrifting) turnSpeed = 0.045;
            if (keys.a) { angle += turnSpeed; }
            if (keys.d) { angle -= turnSpeed; }

            // ミニターボ＆ドリフト
            if (keys.shift && Math.abs(speed) > 0.5 && (keys.a || keys.d)) {
                if (!isDrifting) { isDrifting = true; driftDir = keys.a ? 1 : -1; driftCharge = 0; }
                driftCharge++;
                sparkLeft.visible = true; sparkRight.visible = true;
                if (driftCharge > 85) {
                    turboState = 2; sparkLeft.material.color.setHex(0x00ffff); sparkRight.material.color.setHex(0x00ffff);
                } else if (driftCharge > 40) {
                    turboState = 1; sparkLeft.material.color.setHex(0x0055ff); sparkRight.material.color.setHex(0x0055ff);
                } else {
                    turboState = 0; sparkLeft.material.color.setHex(0xff4500); sparkRight.material.color.setHex(0xff4500);
                }
            } else {
                if (isDrifting) {
                    isDrifting = false; sparkLeft.visible = false; sparkRight.visible = false;
                    if (turboState === 2) { turboTimer = 65; speed = 3.4; soundBoost(); document.getElementById("turbo-ui").innerText = "🔥🔴 ウルトラミニターボ発動！！！ 🔴🔥"; document.getElementById("turbo-ui").style.color = "#ff3333"; }
                    else if (turboState === 1) { turboTimer = 40; speed = 2.8; soundBoost(); document.getElementById("turbo-ui").innerText = "🔥🔵 スーパーミニターボ発動！！！ 🔵🔥"; document.getElementById("turbo-ui").style.color = "#0077ff"; }
                    turboState = 0; driftCharge = 0;
                }
            }

            // ジャンプチャージ
            if (keys[" "] && carY <= 0.15 && poleSpinTimer <= 0) { jumpChargeTime++; }

            // ブーストUI表示消去
            if (turboTimer > 0) { turboTimer--; } else { if(document.getElementById("turbo-ui").innerText.includes("ターボ") || document.getElementById("turbo-ui").innerText.includes("スタート")) document.getElementById("turbo-ui").innerText = ""; }

            // 物理位置適用
            carGroup.position.x += Math.sin(angle) * speed;
            carGroup.position.z += Math.cos(angle) * speed;
            carGroup.rotation.y = angle;
        }

        // 壁キック＆壁走り３次元高度物理エンジン（工場壁寄せ仕様対応）
        let insideFactoryX = (carGroup.position.z < 50 && carGroup.position.z > -150);
        isWallRiding = false;
        
        if (insideFactoryX) {
            // 右の壁際
            if (carGroup.position.x >= RIGHT_WALL_X - 6) {
                carGroup.position.x = RIGHT_WALL_X - 6; isWallRiding = true; wallRideSide = 1;
            }
            // 左の壁際
            if (carGroup.position.x <= LEFT_WALL_X + 6) {
                carGroup.position.x = LEFT_WALL_X + 6; isWallRiding = true; wallRideSide = -1;
            }
        }

        if (wallKickIgnoreTimer > 0) { wallKickIgnoreTimer--; } else { wallKickVelocityX *= 0.85; }
        carGroup.position.x += wallKickVelocityX;

        // 垂直ジャンプ・トリックアクション３次元物理
        if (poleSpinTimer > 0) {
            carGroup.rotation.y += 0.35; 
            document.getElementById("turbo-ui").innerText = "🌀 スピンジャンプトリック！！！ 🌀";
            document.getElementById("turbo-ui").style.color = "#00ffff";
        }
        
        if (jumpActionTimer > 0) {
            carModel.rotation.x += jumpRotX; carModel.rotation.z += jumpRotZ;
        } else {
            carModel.rotation.set(0,0,0);
        }

        jumpVelocity -= 0.035; carY += jumpVelocity;
        if (carY <= 0) {
            carY = 0; jumpVelocity = 0;
            if (hasJumpActioned) {
                hasJumpActioned = false; turboTimer = 35; speed += 0.45; soundBoost();
                if(!isWallRiding && poleSpinTimer <= 0 && !document.getElementById("turbo-ui").innerText.includes("壁キック")) {
                    document.getElementById("turbo-ui").innerText = "✨ トリック着地ブースト成功！！！ ✨";
                    document.getElementById("turbo-ui").style.color = "#ffeb3b";
                }
            }
        }
        carGroup.position.y = carY + 0.4;
    }

    // 🏁 チェックポイント・周回判定エンジン
    if (carGroup.position.z < -200 && carGroup.position.z > -400) { midCheckpointPassed = true; }
    
    // 黄色いエントリーゾーン通過でレーススタート判定
    if (raceState === 2 && carGroup.position.z < 130 && carGroup.position.z > 90 && Math.abs(carGroup.position.x) < 40) {
        document.getElementById("status-text").innerText = "レース中！上位を目指そう！"; document.getElementById("status-text").style.color = "#00ff00";
    }

    // ゴールライン通過
    if (midCheckpointPassed && carGroup.position.z < 60 && carGroup.position.z > 40 && Math.abs(carGroup.position.x) < 40) {
        midCheckpointPassed = false;
        if (!isFinished) {
            playerLap++;
            if (playerLap > 3) {
                isFinished = true; raceState = 3;
                document.getElementById("status-text").innerText = `🎉 レース終了！最終順位: ${getPlayerRank()}位 🎉`;
                document.getElementById("status-text").style.color = "#ffeb3b";
                document.getElementById("countdown").innerText = "FINISH!";
            } else {
                document.getElementById("status-text").innerText = `LAP ${playerLap} に突入！`;
                document.getElementById("status-text").style.color = "#ffff00";
            }
        }
    }

    // 🎥 ３D背後追従シネマティックカメラワーク
    let targetCam = new THREE.Vector3(
        carGroup.position.x - Math.sin(angle) * 22,
        carGroup.position.y + 7.5,
        carGroup.position.z - Math.cos(angle) * 22
    );
    currentCameraPos.lerp(targetCam, 0.12);
    camera.position.copy(currentCameraPos);
    camera.lookAt(carGroup.position.x, carGroup.position.y + 1.5, carGroup.position.z);

    renderer.render(scene, camera);
}

// 起動配置とループ開始
startRaceGridPlacement();
loop();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
